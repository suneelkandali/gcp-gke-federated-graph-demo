apiVersion: apps/v1
kind: Deployment
metadata:
  name: router-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      containers:
      - name: router
        image: ghcr.io/apollographql/router:v1.45.0
        env:
        - name: APOLLO_KEY
          value: "service:My-Graph-9f5n9i:6m3EGaFe48wS0ydSp6CGWA"
        - name: APOLLO_GRAPH_REF
          value: "My-Graph-9f5n9i@current"
        ports:
        - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: router-service
spec:
  type: LoadBalancer
  selector:
    app: router
  ports:
    - protocol: TCP
      port: 80
      targetPort: 4000