apiVersion: apps/v1
kind: Deployment
metadata:
  name: reviews-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: reviews
  template:
    metadata:
      labels:
        app: reviews
    spec:
      containers:
      - name: reviews
        image: gcr.io/federated-graph-demo/subgraph-reviews:1.0.0
        ports:
        - containerPort: 4002
---
apiVersion: v1
kind: Service
metadata:
  name: reviews-service
spec:
  selector:
    app: reviews
  ports:
    - protocol: TCP
      port: 4002
      targetPort: 4002